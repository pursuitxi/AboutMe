<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Color Palette</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden; background: #f5f5f5;
      -webkit-tap-highlight-color: transparent;
    }
    #palette { display: flex; flex: 1; overflow: hidden; }
    .swatch {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding-bottom: 28px; position: relative; transition: flex 0.25s ease; min-width: 0;
      cursor: pointer;
      user-select: none;
    }
    .swatch.is-dragging { cursor: grabbing !important; opacity: 0.45; }
    .swatch.drag-over { outline: 3px dashed rgba(255,255,255,0.7); outline-offset: -5px; }

    .drag-handle {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      font-size: 18px; cursor: grab; padding: 4px 8px; border-radius: 5px;
      opacity: 0.5; transition: opacity 0.15s; touch-action: none;
    }
    .drag-handle:hover { opacity: 1; }

    .copied-toast {
      position: absolute; bottom: 76px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; border-radius: 4px;
      padding: 3px 9px; pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
    }
    .copied-toast.show { opacity: 1; }

    .swatch-inner {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      width: 100%; padding: 0 4px;
    }

    .hex-edit-wrap { display: flex; align-items: center; gap: 4px; max-width: 100%; }

    .hex-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 4px; padding: 3px 7px; cursor: pointer; transition: filter 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .hex-label:hover { filter: brightness(0.85); }

    .hex-input-field {
      display: none; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      background: rgba(255,255,255,0.22); border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 4px; padding: 3px 6px; width: 84px; text-align: center; outline: none;
    }
    .hex-input-field.invalid { border-color: rgba(255,80,80,0.85) !important; }

    .edit-btn {
      background: rgba(0,0,0,0.14); border: none; border-radius: 50%;
      width: 22px; height: 22px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px; transition: background 0.15s;
    }
    .edit-btn:hover { background: rgba(0,0,0,0.28); }

    .swatch-controls { display: flex; gap: 7px; align-items: center; }

    .ctrl-btn {
      background: rgba(0,0,0,0.18); border: none; border-radius: 50%;
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; transition: background 0.15s, transform 0.1s;
    }
    .ctrl-btn:hover { background: rgba(0,0,0,0.32); transform: scale(1.08); }
    .ctrl-btn:active { transform: scale(0.93); }
    .ctrl-btn.locked { background: rgba(0,0,0,0.38); }

    .add-btn-wrap { position: absolute; right: -13px; top: 50%; transform: translateY(-50%); z-index: 999; }
    .add-btn {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.5); color: rgba(0,0,0,0.5); font-size: 19px; font-weight: 300;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.18); line-height: 1;
      transition: background 0.15s, color 0.15s, transform 0.12s;
    }
    .add-btn:hover { background: rgba(255,255,255,0.92); color: #111; }
    .add-btn:active { transform: scale(0.92); }

    #toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #fff; border-top: 1px solid #e8e8e8;
      gap: 8px; flex-shrink: 0;
    }
    #space-hint { font-size: 11px; color: #999; line-height: 1.4; }
    #space-hint kbd {
      display: inline-block; background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px;
      padding: 1px 5px; font-size: 10px; font-family: monospace; color: #555;
    }
    #count-info { font-size: 11px; color: #bbb; white-space: nowrap; }
    #random-btn {
      display: none; align-items: center; justify-content: center; gap: 5px;
      background: #222; color: #fff; border: none; border-radius: 20px;
      padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    #random-btn:active { opacity: 0.8; transform: scale(0.97); }

    @media (hover: none) and (pointer: coarse) {
      #space-hint { display: none; }
      #random-btn { display: flex; }
    }
  </style>
</head>
<body>

<div id="palette"></div>

<div id="toolbar">
  <span id="space-hint">
    <kbd>Space</kbd> 随机刷新 &nbsp;·&nbsp; 点击 <i class="ti ti-edit" style="font-size:12px;vertical-align:-1px"></i> 输入十六进制
  </span>
  <button id="random-btn" onclick="randomize()">
    <i class="ti ti-refresh" style="font-size:15px"></i> 随机
  </button>
  <span id="count-info"></span>
</div>

<script>
const paletteEl = document.getElementById('palette');
const countInfo = document.getElementById('count-info');
const isMobile = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

function randHex() {
  return '#' + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, '0');
}
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}
function lerpColor(h1,h2,t) {
  const [r1,g1,b1]=hexToRgb(h1),[r2,g2,b2]=hexToRgb(h2);
  return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
}
function luminance(hex) {
  return hexToRgb(hex).reduce((s,v,i) => {
    v/=255; v=v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);
    return s+v*[0.2126,0.7152,0.0722][i];
  }, 0);
}
function tc(hex) { return luminance(hex)>0.35?'rgba(0,0,0,0.76)':'rgba(255,255,255,0.93)'; }
function tbg(hex) { return luminance(hex)>0.35?'rgba(0,0,0,0.1)':'rgba(255,255,255,0.15)'; }
function ba(hex) { return luminance(hex)>0.35?'0,0,0':'255,255,255'; }
function isValidHex(v) { return /^#?[0-9a-fA-F]{6}$/.test(v.trim()); }
function normalizeHex(v) { v=v.trim(); return (v.startsWith('#')?v:'#'+v).toLowerCase(); }

let swatches = [randHex(),randHex(),randHex(),randHex()].map(c=>({color:c,locked:false}));
let dragSrc = null;
let editingIndex = null;

function randomize() {
  swatches.forEach(sw => { if (!sw.locked) sw.color = randHex(); });
  render();
}

function startEdit(i) {
  if (editingIndex !== null && editingIndex !== i) commitEdit(editingIndex);
  editingIndex = i;
  const label = document.getElementById(`hex-label-${i}`);
  const input = document.getElementById(`hex-input-${i}`);
  const editBtn = document.getElementById(`edit-btn-${i}`);
  if (!label || !input) return;
  label.style.display = 'none';
  input.style.display = 'block';
  input.value = swatches[i].color.toUpperCase();
  input.style.color = tc(swatches[i].color);
  if (editBtn) editBtn.style.display = 'none';
  input.focus(); input.select();
}

function commitEdit(i) {
  if (editingIndex !== i) return;
  editingIndex = null;
  const input = document.getElementById(`hex-input-${i}`);
  if (!input) return;
  const val = input.value.trim();
  if (isValidHex(val)) swatches[i].color = normalizeHex(val);
  render();
}

function applyOverflowHiding() {
  const swatchEls = paletteEl.querySelectorAll('.swatch');
  swatchEls.forEach((swatchEl, i) => {
    const swatchW = swatchEl.offsetWidth;
    const swatchH = swatchEl.offsetHeight;

    const handle = swatchEl.querySelector('.drag-handle');
    const inner = swatchEl.querySelector('.swatch-inner');
    const addWrap = swatchEl.querySelector('.add-btn-wrap');

    const needsHideHandle = swatchW < 44;
    if (handle) handle.style.visibility = needsHideHandle ? 'hidden' : '';

    if (!inner) return;

    const innerH = inner.offsetHeight;
    const innerW = inner.offsetWidth;
    const availH = swatchH - 28 - 36;
    const needsHideAll = innerH > availH || innerW > swatchW - 8;

    if (needsHideAll) {
      inner.style.visibility = 'hidden';
    } else {
      inner.style.visibility = '';

      const hexWrap = inner.querySelector('.hex-edit-wrap');
      const controls = inner.querySelector('.swatch-controls');
      const hexH = hexWrap ? hexWrap.offsetHeight : 0;
      const ctrlH = controls ? controls.offsetHeight : 0;
      const gap = 10;

      if (hexH + gap + ctrlH > availH) {
        if (hexWrap) hexWrap.style.visibility = 'hidden';
        if (controls) controls.style.visibility = '';
      } else {
        if (hexWrap) hexWrap.style.visibility = '';
        if (controls) controls.style.visibility = '';
      }

      if (controls) {
        const ctrlW = controls.offsetWidth;
        if (ctrlW > swatchW - 8) {
          controls.style.visibility = 'hidden';
        }
      }
    }

    if (addWrap) addWrap.style.display = swatchW < 32 ? 'none' : '';
  });
}

function render() {
  paletteEl.innerHTML = '';
  countInfo.textContent = `${swatches.length}/10`;

  swatches.forEach((sw, i) => {
    const div = document.createElement('div');
    div.className = 'swatch';
    div.style.background = sw.color;

    const color = tc(sw.color);
    const bg = tbg(sw.color);
    const b = ba(sw.color);

    div.innerHTML = `
      <div class="drag-handle" id="drag-handle-${i}" style="color:${color}">
        <i class="ti ti-grip-horizontal"></i>
      </div>
      <div class="copied-toast" id="toast-${i}">已复制！</div>
      <div class="swatch-inner">
        <div class="hex-edit-wrap">
          <span class="hex-label" id="hex-label-${i}" title="点击复制" style="color:${color};background:${bg}">
            ${sw.color.toUpperCase()}
          </span>
          <input class="hex-input-field" id="hex-input-${i}" maxlength="7" spellcheck="false"
            style="color:${color};border-color:rgba(${b},0.5)" value="${sw.color.toUpperCase()}" />
          <button class="edit-btn" id="edit-btn-${i}" title="编辑颜色" style="color:${color};background:rgba(${b},0.14)">
            <i class="ti ti-edit"></i>
          </button>
        </div>
        <div class="swatch-controls">
          <button class="ctrl-btn ${sw.locked?'locked':''}" data-action="lock" data-index="${i}"
            title="${sw.locked?'解锁':'锁定'}"
            style="color:${color};background:rgba(${b},${sw.locked?'0.38':'0.18'})">
            <i class="ti ti-${sw.locked?'lock':'lock-open'}"></i>
          </button>
          ${swatches.length>1
            ? `<button class="ctrl-btn" data-action="remove" data-index="${i}" title="删除"
                 style="color:${color};background:rgba(${b},0.18)">
                 <i class="ti ti-x"></i>
               </button>`
            : ''}
        </div>
      </div>
      ${swatches.length<10 && i < swatches.length - 1
        ? `<div class="add-btn-wrap">
             <button class="add-btn" data-action="add" data-index="${i}" title="插入色卡">+</button>
           </div>`
        : ''}
    `;

    div.querySelector(`#hex-label-${i}`).addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(sw.color.toUpperCase()).catch(()=>{});
      const toast = div.querySelector(`#toast-${i}`);
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 1200);
    });

    div.querySelector(`#edit-btn-${i}`).addEventListener('click', e => {
      e.stopPropagation(); startEdit(i);
    });

    const input = div.querySelector(`#hex-input-${i}`);
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('input', () => {
      const v = input.value.trim();
      const valid = isValidHex(v);
      input.classList.toggle('invalid', !valid);
      if (valid) { const hex=normalizeHex(v); div.style.background=hex; input.style.color=tc(hex); }
    });
    input.addEventListener('keydown', e => {
      if (e.key==='Enter') { e.preventDefault(); commitEdit(i); }
      if (e.key==='Escape') { editingIndex=null; render(); }
    });
    input.addEventListener('blur', () => setTimeout(()=>commitEdit(i), 150));

    div.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (btn) {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        const action = btn.dataset.action;
        if (action==='lock') { swatches[idx].locked=!swatches[idx].locked; render(); }
        else if (action==='remove') { if(swatches.length>1){swatches.splice(idx,1);render();} }
        else if (action==='add') {
          if (swatches.length<10) {
            const left=swatches[idx]?.color??'#ffffff';
            const right=swatches[idx+1]?.color??'#000000';
            swatches.splice(idx+1,0,{color:lerpColor(left,right,0.5),locked:false});
            render();
          }
        }
        return;
      }
      if (isMobile() && editingIndex===null && !sw.locked) {
        sw.color = randHex(); render();
      }
    });

    
    const handle = div.querySelector(`#drag-handle-${i}`);
    handle.addEventListener('pointerdown', e => {
      if (e.button !== 0 && e.pointerType === 'mouse') return;
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      dragSrc = i;
      div.classList.add('is-dragging');
    });

    handle.addEventListener('pointermove', e => {
      if (dragSrc !== i) return;
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const target = el?.closest('.swatch');
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('drag-over'));
      if (target && target !== div) target.classList.add('drag-over');
    });

    handle.addEventListener('pointerup', e => {
      if (dragSrc !== i) return;

      div.classList.remove('is-dragging');
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('drag-over'));

      const el = document.elementFromPoint(e.clientX, e.clientY);
      const target = el?.closest('.swatch');

      if (target && target !== div) {
        const targetIdx = Array.from(paletteEl.children).indexOf(target);
        if (targetIdx !== -1) {
          const moved = swatches.splice(dragSrc, 1)[0];
          swatches.splice(targetIdx, 0, moved);
          dragSrc = null;
          render();
          return;
        }
      }
      dragSrc = null;
    });

    handle.addEventListener('pointercancel', () => {
      div.classList.remove('is-dragging');
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('drag-over'));
      dragSrc = null;
    });


    paletteEl.appendChild(div);
  });

  if (editingIndex!==null && editingIndex<swatches.length) {
    setTimeout(()=>startEdit(editingIndex), 0);
  }

  if (isMobile()) requestAnimationFrame(applyOverflowHiding);
}

window.addEventListener('resize', () => { if (isMobile()) requestAnimationFrame(applyOverflowHiding); });

document.addEventListener('keydown', e => {
  if (e.code==='Space' && editingIndex===null && !['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) {
    e.preventDefault(); randomize();
  }
});

render();
</script>
</body>
</html>
